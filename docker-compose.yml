services:
  # ============================================
  # DATABASES
  # ============================================
  db-directus:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - directus_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
      POSTGRES_DB: ${DIRECTUS_DB_NAME:-directus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIRECTUS_DB_USER:-directus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-twenty:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - twenty_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${TWENTY_DB_USER:-twenty}
      POSTGRES_PASSWORD: ${TWENTY_DB_PASSWORD:-twenty}
      POSTGRES_DB: ${TWENTY_DB_NAME:-twenty}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TWENTY_DB_USER:-twenty}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # CMS — DIRECTUS
  # ============================================
  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "8055:8055"
    depends_on:
      db-directus:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      SECRET: ${DIRECTUS_SECRET:-change-me}
      DB_CLIENT: pg
      DB_HOST: db-directus
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_NAME:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      # Purge the response cache on content mutations — without this, edits
      # (admin UI or API alike) serve stale for the cache TTL and editors
      # think their changes didn't apply.
      CACHE_AUTO_PURGE: "true"
      REDIS: redis://redis:6379
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "*"

  # ============================================
  # CRM — TWENTY
  # ============================================
  twenty-server:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    ports:
      - "3003:3000"
    depends_on:
      db-twenty:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_DATABASE_URL: postgresql://${TWENTY_DB_USER:-twenty}:${TWENTY_DB_PASSWORD:-twenty}@db-twenty:5432/${TWENTY_DB_NAME:-twenty}
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-change-me}
      SERVER_URL: ${TWENTY_SERVER_URL:-http://localhost:3003}
      FRONT_BASE_URL: ${TWENTY_FRONT_URL:-http://localhost:3003}
      SIGN_IN_PREFILLED: "true"
      IS_BILLING_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  twenty-worker:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    depends_on:
      db-twenty:
        condition: service_healthy
      twenty-server:
        condition: service_healthy
    environment:
      PG_DATABASE_URL: postgresql://${TWENTY_DB_USER:-twenty}:${TWENTY_DB_PASSWORD:-twenty}@db-twenty:5432/${TWENTY_DB_NAME:-twenty}
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-change-me}
      SERVER_URL: ${TWENTY_SERVER_URL:-http://localhost:3003}
      DISABLE_DB_MIGRATIONS: "true"

volumes:
  directus_db:
  directus_uploads:
  directus_extensions:
  twenty_db:
  redis_data:
